# Auto-generated admin spawn bottles for every non-abstract reagent.
# Keep under _OpenSpace: this is fork-only admin convenience content.

- type: entity
  abstract: true
  parent: BaseChemistryBottleFilled
  id: AdminChemBottleBase
  name: chembottle
  description: Admin-spawn chemistry bottle filled with 30 units of a reagent.

- type: entity
  parent: AdminChemBottleBase
  id: AdminChemBottleAbsinthe
  name: "Бутылочка абсент"
  suffix: Absinthe
  components:
  - type: Label
    currentLabel: reagent-name-absinthe
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: Absinthe
          Quantity: 30

