- type: entity
  id: ChemDispenserEmpty
  name: ХимРаздатчик 5000
  suffix: Empty
  parent: ReagentDispenserBase
  description: Автоматический синтезатор базовых реагентов с энергетическим буфером.
  components:
  - type: Sprite
    sprite: Structures/dispensers.rsi
    state: industrial-working
    snapCardinals: true
  - type: Storage
    openOnActivate: false
    whitelist:
      tags:
      - ChemDispensable
  - type: ApcPowerReceiver
  - type: ExtensionCableReceiver
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:ChangeConstructionNodeBehavior
        node: machineFrame
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Machine
    board: ChemDispenserMachineCircuitboard
  - type: GuideHelp
    guides:
    - Chemicals
    - Chemist
  - type: StealTarget
    stealGroup: ChemDispenser
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25, -0.4, 0.25, 0.4"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer

- type: entity
  id: ChemDispenser
  suffix: Filled
  parent: ChemDispenserEmpty
  components:
  # open-space edit start
  - type: ReagentDispenser
    dispensedReagents:
    - Nitrogen
    - Aluminium
    - Bromine
    - Water
    - Hydrogen
    - Iron
    - Iodine
    - Potassium
    - Oxygen
    - Silicon
    - Lithium
    - Copper
    - Sodium
    - Plasma
    - Radium
    - Mercury
    - Sugar
    - Sulfur
    - Silver
    - Carbon
    - Phosphorus
    - Fluorine
    - Chlorine
    - Chromium
    - Ethanol
  # open-space edit end
