- type: entity
  parent: BasePDA
  id: BlueShieldPDA
  name: blueshield officer's PDA
  description: Comes with a built-in medtek to assess command staff's wounds after you heroically save them.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Devices/pda.rsi
  - type: Pda
    id: BlueShieldIDCard
  - type: Appearance
    appearanceDataInit:
     enum.PdaVisuals.PdaType:
       !type:String
       pda-blueshield
  - type: PdaBorderColor
    borderColor: "#202125"
    accentHColor: "#004281"
  - type: Icon
    sprite: _Starlight/Objects/Devices/pda.rsi
    state: pda-blueshield
  - type: CartridgeLoader
    uiKey: enum.PdaUiKey.Key
    preinstalled:
      - CrewManifestCartridge
      - NotekeeperCartridge
      - NanoTaskCartridge
      - NewsReaderCartridge
      - MedTekCartridge

