#BSO Hardsuit
- type: entity
  parent: [ClothingOuterHardsuitBase]
  id: ClothingOuterHardsuitBlueshield
  name: blue shield hardsuit
  description: A high-tech hardsuit perfect for diving in front of Mr. Pre- Er, Captain.
  components:
  - type: Tag
    tags:
    - Hardsuit
    - WhitelistChameleon
    - CorgiWearable
  - type: Sprite
    sprite: _Starlight/Clothing/OuterClothing/Hardsuits/blueshield.rsi
  - type: Clothing
    sprite: _Starlight/Clothing/OuterClothing/Hardsuits/blueshield.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.525
    lowPressureMultiplier: 10000
  - type: ClothingSpeedModifier
    walkModifier: 0.8
    sprintModifier: 0.8
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.6
        Slash: 0.5
        Piercing: 0.5
        Heat: 0.7
        Radiation: 0.25
        Caustic: 0.6
    staminaModifier: 0.6
  - type: ExplosionResistance
    damageCoefficient: 0.6
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitBlueshield
  - type: StealTarget
    stealGroup: BSOHardsuit

