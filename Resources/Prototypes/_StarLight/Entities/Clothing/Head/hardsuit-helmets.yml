## ARCHETYPES
# Head-mounted light archetypes. These are the archetypes we've identified and group helmet lights into.
# Base types ClothingHeadLightBase and ClothingHeadSuitWithLightBase no longer have radius/energy specified,
# so using one of the below archetypes is required.

- type: entity
  abstract: true
  id: ClothingHeadLightParamsBasic # Basic, non-job specific, e.g. the firesuit helmet.
  components:
    - type: PointLight
      radius: 5
      energy: 1

- type: entity
  abstract: true
  id: ClothingHeadLightParamsIntermediate # Intermediate, intended for non-combat jobs.
  components:
    - type: PointLight
      radius: 5
      energy: 2

- type: entity
  abstract: true
  id: ClothingHeadLightParamsAdvanced # Advanced, intended for combatant jobs.
  components:
    - type: PointLight
      radius: 6
      energy: 3

- type: entity
  abstract: true
  id: ClothingHeadLightParamsProfessional # Professional, for e.g. CE, ERT, Mining hardsuit.
  components:
    - type: PointLight
      radius: 7
      energy: 2.5

- type: entity
  abstract: true
  id: ClothingHeadLightParamsFloodlight # Floodlight, for e.g. Advanced mining hardsuit.
  components:
    - type: PointLight
      radius: 9
      energy: 3

## END OF ARCHETYPES

#BSO Hardsuit
- type: entity
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase, ClothingHeadLightParamsAdvanced ]
  id: ClothingHeadHelmetHardsuitBlueshield
  categories: [ HideSpawnMenu ]
  name: blue shield hardsuit helmet
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Head/Hardsuits/blueshield.rsi
  - type: Clothing
    sprite: _Starlight/Clothing/Head/Hardsuits/blueshield.rsi
  - type: PointLight
    color: "#adeeff"
  - type: PressureProtection
    highPressureMultiplier: 0.45
    lowPressureMultiplier: 10000
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
  - type: Tag
    tags:
    - WhitelistChameleon
    - CorgiWearable

