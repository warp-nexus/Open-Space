- type: entity
  parent: [ ClothingNeckBase, BaseCommandContraband ]
  id: ClothingNeckCloakBsoElite
  name: elite blueshield officer's cloak
  description: An elite blueshield officer's cloak crafted from the latest composite glowing fabric. Any true BlueShield is not afraid of shining in the dark!
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Neck/Cloaks/bso_elite.rsi
  - type: StealTarget
    stealGroup: HeadCloak
  - type: PointLight
    radius: 2
    energy: 4
    color: "#84BEF4"
  - type: StaticPrice
    price: 2000

- type: entity
  parent: [ ClothingNeckBase, BaseCommandContraband ]
  id: ClothingNeckCloakBsoCape
  name: blueshield officer's formal cloak
  description: An incredibly large coat, owned only by the most experienced blueshields. It's said the sleeves have never been worn.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Neck/Cloaks/bso_formal.rsi
  - type: Clothing
    slots:
      - neck

- type: entity
  parent: [ ClothingNeckBase, BaseCommandContraband ]
  id: ClothingNeckCloakBsoPoncho
  name: blueshield officer's poncho
  description: This type of poncho was the signature garment of a legendary BSO with no name, or so it is said.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Neck/Cloaks/bso_poncho
  - type: Clothing
    slots:
      - neck

