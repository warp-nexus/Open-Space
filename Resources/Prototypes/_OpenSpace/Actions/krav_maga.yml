    icon:
      sprite: _OpenSpace/Interface/Actions/krav_maga.rsi
      state: lungpunch
  - type: TargetAction
    range: 1.5
  - type: EntityTargetAction
    event: !type:KravMagaLungPunchActionEvent

- type: entity
