- type: entity
  parent: BaseAction
  id: ActionKravMagaLegSweep
  name: Leg Sweep
  description: Trip the target and stun them for a short time.
  components:
  - type: Action
    icon:
      sprite: _OpenSpace/Interface/Actions/krav_maga.rsi
      state: legsweep
  - type: TargetAction
    range: 1.5
  - type: EntityTargetAction
    event: !type:KravMagaLegSweepActionEvent

- type: entity
  parent: BaseAction
  id: ActionKravMagaLungPunch
