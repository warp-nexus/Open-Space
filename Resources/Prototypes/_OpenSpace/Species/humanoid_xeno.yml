- type: species
  id: HumanoidXeno
  name: species-name-xeno
  roundStart: true
  sponsorOnly: true
  prototype: MobHumanoidXeno
  bodyTypes:
  - HumanoidXenoNormal
  markingLimits: MobHumanoidXenoMarkingLimits
  dollPrototype: MobXenoDummy
  skinColoration: Hues
  maleFirstNames: names_xeno_first
  femaleFirstNames: names_xeno_first
  maleLastNames: names_xeno_last
  femaleLastNames: names_xeno_last
  defaultHeight: 1.1
  defaultWidth: 1.2
  sexes:
  - Unsexed
  - Male
  - Female

- type: bodyType
  id: HumanoidXenoNormal
  name: body-normal
  sprites:
    Head: MobHumanoidXenoHead
    Chest: MobHumanoidXenoTorso
    Tail: MobHumanoidAnyMarking
    LArm: MobHumanoidXenoLArm
    RArm: MobHumanoidXenoRArm
    LHand: MobHumanoidXenoLHand
    RHand: MobHumanoidXenoRHand
    LLeg: MobHumanoidXenoLLeg
    RLeg: MobHumanoidXenoRLeg
    LFoot: MobHumanoidXenoLFoot
    RFoot: MobHumanoidXenoRFoot

- type: markingPoints
  id: MobHumanoidXenoMarkingLimits
  onlyWhitelisted: true
  points:
    Hair:
      points: 0
      required: false
    FacialHair:
      points: 0
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [ HumanoidXenoTailDrone ]
    Head:
      points: 1
      required: true
      defaultMarkings: [ HumanoidXenoHeadDrone ]
    HeadTop:
      points: 0
      required: false
    Chest:
      points: 1
      required: false
    Legs:
      points: 1
      required: false
    Arms:
      points: 1
      required: false
    Tracheas:
      points: 1
      required: true
      defaultMarkings: [ HumanoidXenoTracheasDrone ]

