- type: entity
  id: PartHumanoidXeno
  parent: [ BaseItem, OrganBase ]
  name: "xenomorph body part"
  abstract: true
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10

- type: entity
  id: TorsoHumanoidXeno
  name: "xenomorph torso"
  parent: [ PartHumanoidXeno, OrganBaseTorsoSexed ]
  components:
  - type: Sprite
    netsync: false
    sprite: _OpenSpace/Mobs/Species/HumanoidXeno/parts.rsi
    state: "torso_m"
  - type: Icon
    sprite: _OpenSpace/Mobs/Species/HumanoidXeno/parts.rsi
    state: "torso_m"

