- type: entity
  parent: [BaseItem, BaseSyndicateContraband]
  id: CqcManualScroll
  name: CQC manual
  description: A compact black manual with tactical close-quarters combat instructions.
  components:
  - type: Sprite
    sprite: _OpenSpace/Objects/Combat/cqc_manual.rsi
    state: icon
  - type: Item
    size: Small
  - type: TriggerOnUse
  - type: AddComponentsOnTrigger
    targetUser: true
    components:
    - type: CloseQuarterCombatMastery
  - type: DeleteOnTrigger

