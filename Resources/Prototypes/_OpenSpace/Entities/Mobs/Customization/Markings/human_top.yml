- type: marking
  id: CatEarsBasic
  bodyPart: HeadTop
  groupWhitelist: [Human]
  coloring:
    default:
      type:
        !type:CategoryColoring
        category: Hair
      fallbackTypes:
        - !type:SkinColoring
    layers:
      ears_cat_inner:
        type:
          !type:SimpleColoring
          color: "#FFFFFF"
  sprites:
  - sprite: _OpenSpace/Mobs/Customization/human_top.rsi
    state: ears_basic_outer
  - sprite: _OpenSpace/Mobs/Customization/human_top.rsi
    state: ears_basic_inner

